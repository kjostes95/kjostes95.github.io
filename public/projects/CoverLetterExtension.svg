<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 620" width="1000" height="620">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#000000" flood-opacity="0.22"/>
    </filter>
  </defs>

  <rect width="1000" height="620" fill="#f1f5f9"/>

  <rect x="260" y="24" width="480" height="572" rx="10" fill="#ffffff" filter="url(#shadow)"/>
  <rect x="284" y="46" width="432" height="528" rx="8" fill="#ffffff" stroke="#e5e7eb"/>

  <text x="306" y="76" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#333333">Cover Letter Generator</text>
  <text x="306" y="96" font-family="Arial, sans-serif" font-size="13" fill="#666666">Create tailored cover letters instantly</text>

  <text x="306" y="125" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#333333" letter-spacing="0.4">1. UPLOAD RESUME</text>
  <rect x="306" y="134" width="388" height="58" rx="6" fill="#ffffff" stroke="#dddddd" stroke-width="2" stroke-dasharray="6 5"/>
  <text x="500" y="157" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#666666"><tspan font-weight="700" fill="#333333">Click to upload</tspan> or drag and drop</text>
  <text x="500" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#666666">PDF, DOC, or DOCX (Max 5MB)</text>

  <rect x="306" y="202" width="388" height="32" rx="4" fill="#f3f4f6"/>
  <text x="500" y="222" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#374151">Resume loaded: Kevin Jostes Developer.docx</text>

  <rect x="306" y="242" width="388" height="28" rx="4" fill="#fff8e1"/>
  <text x="500" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#8a5a00">Working...</text>

  <text x="306" y="293" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#333333" letter-spacing="0.4">2. AI SETTINGS</text>
  <rect x="306" y="302" width="16" height="16" rx="2" fill="#4caf50"/>
  <path d="M311 310 L314 313 L319 306" stroke="#ffffff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="330" y="315" font-family="Arial, sans-serif" font-size="13" fill="#333333">Use AI when available</text>

  <rect x="306" y="326" width="388" height="34" rx="6" fill="#fafafa" stroke="#d0d7de"/>
  <text x="322" y="347" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#1f2937">Configure API Key, Endpoint, and Model</text>

  <text x="306" y="386" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#333333" letter-spacing="0.4">3. GENERATE DRAFT</text>
  <rect x="306" y="395" width="388" height="40" rx="4" fill="#4caf50"/>
  <text x="500" y="420" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#ffffff">Generate Draft</text>

  <text x="306" y="458" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#333333" letter-spacing="0.4">4. REVIEW AND EDIT</text>
  <rect x="306" y="466" width="388" height="86" rx="6" fill="#ffffff" stroke="#d0d7de"/>
  <text x="320" y="487" font-family="Arial, sans-serif" font-size="11" fill="#6b7280">Your generated cover letter draft will appear here...</text>
  <text x="320" y="505" font-family="Arial, sans-serif" font-size="11" fill="#6b7280">Dear Hiring Manager,</text>
  <text x="320" y="520" font-family="Arial, sans-serif" font-size="11" fill="#6b7280">I am excited to apply for this role and contribute...</text>

  <rect x="306" y="560" width="188" height="30" rx="4" fill="#6366f1"/>
  <text x="400" y="579" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#ffffff">Regenerate Draft</text>

  <rect x="506" y="560" width="188" height="30" rx="4" fill="#1f6feb"/>
  <text x="600" y="579" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#ffffff">Download .docx</text>
</svg>
